# GRIDLINE reverse proxy: serves the static client and forwards API/WebSocket
# traffic to the backend container, all on one origin (no CORS needed).

server {
  listen 80;
  server_name _;

  # Static client (gridline.html + anything else placed in ./web)
  root /usr/share/nginx/html;
  index gridline.html;

  location / {
    try_files $uri $uri/ /gridline.html;
  }

  # REST API
  location /api/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Socket.io (WebSocket upgrade required)
  location /socket.io/ {
    proxy_pass http://backend:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 86400;
  }
}
