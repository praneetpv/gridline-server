version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gridline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridline}
      POSTGRES_DB: gridline
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gridline"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./gridline-server
    environment:
      DATABASE_URL: postgres://gridline:${POSTGRES_PASSWORD:-gridline}@postgres:5432/gridline
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env — see .env.example}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-12h}
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: nginx:alpine
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
